<!DOCTYPE html>
<html>
<head>
<title>SentimentAI Analyzer</title>

<style>

/* =========================
GLOBAL
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
height:100vh;
background:linear-gradient(120deg,#0b1a35,#020d1f);
color:white;
}

/* =========================
NAVBAR
========================= */

nav{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 40px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#00cfff;
}

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin-left:25px;
}

nav ul li a{
text-decoration:none;
color:white;
transition:0.3s;
}

nav ul li a:hover{
color:#00cfff;
}

/* =========================
MAIN CONTAINER
========================= */

.main-container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
gap:50px;
align-items:center;
}

/* =========================
INPUT CARD
========================= */

.card{
width:420px;
padding:35px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:18px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
text-align:center;
}

.card h2{
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
border:none;
border-radius:10px;
padding:12px;
font-size:15px;
resize:none;
}

/* =========================
BUTTON
========================= */

button{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

/* =========================
RESULT CARD
========================= */

.result-card{
width:350px;
padding:30px;
background:rgba(255,255,255,0.08);
border-radius:18px;
backdrop-filter:blur(15px);
box-shadow:0 10px 40px rgba(0,0,0,0.5);
text-align:center;
}

/* =========================
SENTIMENT TEXT
========================= */

.sentiment{
font-size:26px;
margin-bottom:10px;
}

.positive{color:#00ff88;}
.negative{color:#ff4d4d;}
.neutral{color:#ffc107;}

/* =========================
PROGRESS BAR
========================= */

.progress-bar{
margin-top:15px;
height:12px;
background:#2a2a2a;
border-radius:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff88,#00c6ff);
}

/* =========================
METER
========================= */

.meter{
margin-top:25px;
width:100%;
height:18px;
border-radius:20px;
background:linear-gradient(to right,#ff4d4d,#ffc107,#00ff88);
position:relative;
}

.meter-pointer{
width:18px;
height:18px;
background:white;
border-radius:50%;
position:absolute;
top:0;
left:50%;
box-shadow:0 0 10px white;
}

/* =========================
GRAPH
========================= */

.graph{
margin-top:25px;
height:120px;
background:rgba(255,255,255,0.05);
border-radius:10px;
display:flex;
align-items:flex-end;
justify-content:space-around;
padding:10px;
}

.bar{
width:30px;
background:linear-gradient(180deg,#00c6ff,#0072ff);
border-radius:5px;
transition:0.4s;
}

.bar1{height:20%;}
.bar2{height:20%;}
.bar3{height:20%;}

</style>
</head>


<body>

<nav>
<div class="logo">SentimentAI</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Analyzer</a></li>
<li><a href="#">History</a></li>
</ul>
</nav>


<div class="main-container">

<!-- INPUT CARD -->
<div class="card">

<h2>Analyze Movie Review</h2>

<textarea id="review" placeholder="Type your review here..."></textarea>

<button onclick="analyze()">Analyze Sentiment</button>

</div>


<!-- RESULT CARD -->
<div class="result-card">

<div id="sentimentText" class="sentiment">Waiting...</div>

<p id="confidence">Confidence: 0%</p>

<div class="progress-bar">
<div id="progress" class="progress"></div>
</div>

<div class="meter">
<div id="pointer" class="meter-pointer"></div>
</div>

<div class="graph">
<div id="bar1" class="bar bar1"></div>
<div id="bar2" class="bar bar2"></div>
<div id="bar3" class="bar bar3"></div>
</div>

</div>

</div>


<script>

/* Demo Sentiment Analyzer */

function analyze(){

let sentiments=["Positive 😊","Negative 😡","Neutral 😐"];
let classes=["positive","negative","neutral"];

let index=Math.floor(Math.random()*3);

let confidence=Math.floor(Math.random()*40)+60;

document.getElementById("sentimentText").innerHTML=sentiments[index];
document.getElementById("sentimentText").className="sentiment "+classes[index];

document.getElementById("confidence").innerHTML="Confidence: "+confidence+"%";

document.getElementById("progress").style.width=confidence+"%";

document.getElementById("pointer").style.left=confidence+"%";

document.getElementById("bar1").style.height=Math.floor(Math.random()*100)+"%";
document.getElementById("bar2").style.height=Math.floor(Math.random()*100)+"%";
document.getElementById("bar3").style.height=Math.floor(Math.random()*100)+"%";

}

</script>

</body>
</html>
